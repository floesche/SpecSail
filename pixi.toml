[workspace]
authors = ["Frank Loesche <loeschef@janelia.hhmi.org>"]
channels = ["conda-forge"]
name = "oceanstuff"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
run = "python -u spectrometer.py"
log = "python -u spectrometer_logger.py"
plot = "python -u plot_spectra.py"
calibrate = "python -u calibrate_sunlight.py"
save = "python -u save_results.py"
clear = "rm -f data/*.csv"

[dependencies]
seabreeze = ">=2.11.0,<3"
matplotlib = "*"
numpy = "*"
